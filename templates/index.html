<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Stack App - Number Plate Reader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #999;
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        
        .section {
            margin: 30px 0;
            padding: 20px;
            border: 2px solid #f0f4ff;
            border-radius: 10px;
            background: #fafcff;
        }
        
        .section-title {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        
        .message {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 10px;
            color: #667eea;
            font-size: 1.3em;
            font-weight: 600;
            margin: 10px 0;
            border-left: 5px solid #667eea;
        }
        
        /* Camera Section */
        #cameraContainer {
            display: none;
            background: black;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            position: relative;
            aspect-ratio: 4/3;
        }
        
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        #canvas {
            display: none;
        }
        
        .plate-result {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
            border-left: 5px solid #2196f3;
            display: none;
        }
        
        .plate-result.show {
            display: block;
        }
        
        .plate-text {
            font-size: 1.5em;
            color: #1976d2;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin: 10px 0;
        }
        
        .plate-image {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            margin: 10px 0;
            max-height: 200px;
        }
        
        /* Buttons */
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 15px 0;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 140px;
        }
        
        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-danger {
            background: #f44336;
        }
        
        .btn-danger:hover {
            background: #d32f2f;
        }
        
        .btn-success {
            background: #4caf50;
        }
        
        .btn-success:hover {
            background: #45a049;
        }
        
        .status {
            margin-top: 15px;
            font-size: 0.95em;
            color: #999;
            min-height: 20px;
        }
        
        .status.success {
            color: #4caf50;
        }
        
        .status.error {
            color: #f44336;
        }
        
        .status.loading {
            color: #667eea;
        }
        
        .info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            color: #666;
            font-size: 0.9em;
            line-height: 1.6;
        }
        
        @media (max-width: 500px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .button-group {
                gap: 8px;
            }
            
            button {
                min-width: 100px;
                padding: 10px 16px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Number Plate Reader</h1>
        <p class="subtitle">Capture and decode vehicle number plates</p>
        
        <!-- Number Plate Reader Section -->
        <div class="section">
            <div class="section-title">📸 Number Plate Scanner</div>
            
            <div id="cameraContainer">
                <video id="video" autoplay playsinline></video>
            </div>
            
            <canvas id="canvas"></canvas>
            
            <div class="button-group">
                <button id="startBtn" onclick="startCamera()">📷 Start Camera</button>
                <button id="captureBtn" onclick="capturePhoto()" style="display: none;" class="btn-success">📸 Capture</button>
                <button id="stopBtn" onclick="stopCamera()" style="display: none;" class="btn-danger">⏹️ Stop</button>
            </div>
            
            <div class="plate-result" id="plateResult">
                <div style="color: #1976d2; font-weight: 600; margin-bottom: 10px;">📖 Detected Number Plate:</div>
                <img id="capturedImage" class="plate-image" alt="Captured plate">
                <div class="plate-text" id="plateText">-</div>
                <div style="font-size: 0.9em; color: #666;">Click 'Capture' to scan another plate</div>
            </div>
            
            <div class="status" id="cameraStatus"></div>
        </div>
        
        <!-- Info Section -->
        <div class="info">
            <strong>✨ Features:</strong><br>
            • Real-time camera access<br>
            • OCR-based number plate recognition<br>
            • Instant text extraction<br>
            • Works on mobile & desktop
        </div>
    </div>
    
    <script>
        let stream = null;
        let isProcessing = false;
        
        // Start camera
        async function startCamera() {
            try {
                updateStatus('cameraStatus', 'Requesting camera access...', 'loading');
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                document.getElementById('cameraContainer').style.display = 'block';
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('captureBtn').style.display = 'inline-block';
                document.getElementById('stopBtn').style.display = 'inline-block';
                
                updateStatus('cameraStatus', '✓ Camera ready', 'success');
                setTimeout(() => updateStatus('cameraStatus', '', ''), 2000);
            } catch (error) {
                updateStatus('cameraStatus', '✗ Camera not available', 'error');
                console.error('Camera error:', error);
            }
        }
        
        // Stop camera
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            document.getElementById('cameraContainer').style.display = 'none';
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('captureBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('plateResult').classList.remove('show');
            
            updateStatus('cameraStatus', 'Camera stopped', '');
        }
        
        // Capture and process photo
        async function capturePhoto() {
            if (isProcessing) return;
            
            try {
                isProcessing = true;
                updateStatus('cameraStatus', 'Processing image...', 'loading');
                document.getElementById('captureBtn').disabled = true;
                
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                
                const imageData = canvas.toDataURL('image/jpeg', 0.95);
                
                // Send image to server for OCR using EasyOCR
                updateStatus('cameraStatus', 'Running OCR on server...', 'loading');
                
                const response = await fetch('/api/ocr', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        image: imageData
                    })
                });
                
                const result = await response.json();
                
                if (result.success && result.text.length > 0) {
                    document.getElementById('capturedImage').src = imageData;
                    document.getElementById('plateText').textContent = result.text;
                    document.getElementById('plateResult').classList.add('show');
                    updateStatus('cameraStatus', '✓ Plate detected', 'success');
                } else {
                    updateStatus('cameraStatus', '✗ No text detected in image', 'error');
                }
                
            } catch (error) {
                updateStatus('cameraStatus', '✗ Processing error', 'error');
                console.error('Error:', error);
            } finally {
                isProcessing = false;
                document.getElementById('captureBtn').disabled = false;
            }
        }
        
        // Helper function to update status
        function updateStatus(elementId, message, statusClass) {
            const elem = document.getElementById(elementId);
            elem.textContent = message;
            elem.className = 'status ' + statusClass;
        }
    </script>
</body>
</html>
